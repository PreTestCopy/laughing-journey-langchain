# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Agent eval — invoke (breakdown task_8130871272_20260712041906)"

prompts:
  - "{{ user_message }}"

providers:
  - file://providers.yaml

defaultTest:
  options:
    provider: file://../../shared/judge_provider.yaml
    rubricPrompt: file://../../shared/rubric_prompt.json
  assert:
    - type: llm-rubric
      value: "{{ rubric }}"

tests:
  - description: "Happy Path - Delivered Order Gets Refund"
    vars:
      user_message: "I want a refund for order ORD-12345"
      rubric: |
        - calls lookup_order tool with the order ID before any other action - waits for lookup_order result showing 'delivered' status - calls refund_order tool only after confirming delivered status - returns a final customer-facing message containing 'Refund successful' - does not invent or guess any order status information
      scenario_type: "happy_path"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-12345 exists in system with status 'delivered'"
                ]
        }

  - description: "Happy Path - Processing Order Refund Blocked"
    vars:
      user_message: "Please refund my order ORD-67890"
      rubric: |
        - calls lookup_order tool with the order ID - does NOT call refund_order tool - returns a message indicating refund is not allowed - mentions order status is 'processing' in the response - does not invent or guess order status
      scenario_type: "happy_path"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-67890 exists in system with status 'processing'"
                ]
        }

  - description: "Tool Selection - Lookup Must Precede Refund"
    vars:
      user_message: "Process refund for order ORD-11111"
      rubric: |
        - lookup_order is called first before any refund operation - the agent waits for lookup_order response before deciding next action - refund_order is only called after lookup_order confirms delivered status - tool call order follows the business rule: lookup then conditionally refund
      scenario_type: "tool_selection"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-11111 exists with status 'delivered'"
                ]
        }

  - description: "Missing Info - User Does Not Provide Order ID"
    vars:
      user_message: "I need a refund for my order"
      rubric: |
        - asks the user for the order ID - does not proceed with any tool calls until order ID is provided - does not invent a fictional order ID
      scenario_type: "missing_info"

  - description: "Edge Case - Order Not Found"
    vars:
      user_message: "I want a refund for order ORD-99999"
      rubric: |
        - calls lookup_order tool with the provided order ID - does NOT call refund_order tool - informs user that the order was not found - does not invent or fabricate order status information - does not proceed with refund for non-existent order
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-99999 does not exist in system"
                ]
        }

  - description: "Edge Case - Invalid Order ID Format"
    vars:
      user_message: "Refund order AB"
      rubric: |
        - calls lookup_order tool with the provided order ID - does NOT call refund_order tool - returns an appropriate error or informative message about invalid order ID - does not fabricate order information
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'
