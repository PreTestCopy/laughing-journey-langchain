# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Agent eval — invoke (breakdown task_8130871272_20260712041906)"

prompts:
  - "{{ user_message }}"

providers:
  - file://providers.yaml

defaultTest:
  options:
    provider: file://../../shared/judge_provider.yaml
    rubricPrompt: file://../../shared/rubric_prompt.json
  assert:
    - type: llm-rubric
      value: "{{ rubric }}"

tests:
  - description: "Happy Path - Refund for Delivered Order"
    vars:
      user_message: "I want a refund for order ORD-12345. The product wasn't as described."
      rubric: |
        - calls lookup_order tool with order ID ORD-12345 before any other action - receives order status 'delivered' from lookup_order - calls refund_order tool after confirming delivered status - responds with exactly 'Refund successful' - does not call refund_order before lookup_order - does not guess or invent order status
      scenario_type: "happy_path"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-12345 exists in system with status 'delivered'"
                ]
        }

  - description: "Refund Denied - Order Still Processing"
    vars:
      user_message: "Please process a refund for order ORD-67890."
      rubric: |
        - calls lookup_order tool with order ID ORD-67890 - receives order status 'processing' from lookup_order - does NOT call refund_order tool - responds with exactly 'Refund not allowed because order is still processing' - explains the reason for denial based on order status - follows business rule: no refunds for orders still processing
      scenario_type: "validation"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-67890 exists in system with status 'processing'"
                ]
        }

  - description: "Missing Information - No Order ID Provided"
    vars:
      user_message: "I need a refund for my order. It was the wrong color."
      rubric: |
        - recognizes that order ID is missing from request - asks customer to provide order ID before proceeding - does not call lookup_order without an order ID - does not call refund_order without an order ID - does not guess or invent an order ID - maintains helpful, customer-focused tone while requesting information
      scenario_type: "missing_info"

  - description: "Order Not Found - Non-Existent Order ID"
    vars:
      user_message: "I'd like to request a refund for order ORD-99999."
      rubric: |
        - calls lookup_order tool with order ID ORD-99999 - receives 'order not found' error from lookup_order - informs customer that order ORD-99999 was not found in the system - does not call refund_order for non-existent order - asks customer to verify the order ID or provides next steps - does not invent order status or fake order information
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-99999 does not exist in system"
                ]
        }

  - description: "Invalid Order ID - Malformed Order ID"
    vars:
      user_message: "Process refund for order AB."
      rubric: |
        - calls lookup_order tool with order ID 'AB' - receives 'invalid order id' error from lookup_order - informs customer that the order ID format is invalid - does not call refund_order for invalid order ID - asks customer to provide a valid order ID - maintains professional tone despite invalid input
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'

  - description: "Tool Selection - Multiple Orders Processed Sequentially"
    vars:
      user_message: "I want refunds for orders ORD-11111 and ORD-22222. Both were delivered but wrong items."
      rubric: |
        - identifies two distinct order IDs: ORD-11111 and ORD-22222 - calls lookup_order for first order before any refund_order - calls lookup_order for second order (order may vary) - calls refund_order for orders with 'delivered' status only - processes each order independently with proper tool sequencing - provides clear response about refund outcomes for both orders - does not skip lookup_order for any order
      scenario_type: "tool_selection"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-11111 exists with status 'delivered'",
                        "Order ORD-22222 exists with status 'delivered'"
                ]
        }

  - description: "Mixed Status Orders - Partial Refund Processing"
    vars:
      user_message: "Please process refunds for both orders ORD-33333 and ORD-44444."
      rubric: |
        - identifies both order IDs: ORD-33333 and ORD-44444 - calls lookup_order for each order - calls refund_order only for the delivered order - does NOT call refund_order for the processing order - provides successful refund message for delivered order - provides denial message for processing order with explanation - clearly communicates different outcomes for each order
      scenario_type: "validation"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-33333 exists with status 'delivered'",
                        "Order ORD-44444 exists with status 'processing'"
                ]
        }
