# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Agent eval — invoke (breakdown task_8130871272_20260712041906)"

prompts:
  - "{{ user_message }}"

providers:
  - file://providers.yaml

defaultTest:
  options:
    provider: file://../../shared/judge_provider.yaml
    rubricPrompt: file://../../shared/rubric_prompt.json
  assert:
    - type: llm-rubric
      value: "{{ rubric }}"

tests:
  - description: "Happy Path - Delivered Order Refund Success"
    vars:
      user_message: "Please process a refund for order ORD-12345. The order has been delivered."
      rubric: |
        - calls lookup_order with order ID ORD-12345 before any refund action - calls refund_order after lookup_order confirms delivered status - responds with the exact message 'Refund successful' - does not skip lookup_order before calling refund_order - does not guess order status without calling lookup_order
      scenario_type: "happy_path"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-12345 exists in system with status 'delivered'",
                        "lookup_order will return status 'delivered' for ORD-12345"
                ]
        }

  - description: "Business Rule - Processing Order Refund Denial"
    vars:
      user_message: "I need a refund for order ORD-67890. It's still being processed."
      rubric: |
        - calls lookup_order with order ID ORD-67890 - does NOT call refund_order when order status is 'processing' - responds with the exact message 'Refund not allowed because order is still processing' - explains that refund is not permitted for processing orders - follows business rule: processing orders cannot be refunded
      scenario_type: "happy_path"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-67890 exists in system with status 'processing'",
                        "lookup_order will return status 'processing' for ORD-67890"
                ]
        }

  - description: "Missing Info - Request Order ID When Not Provided"
    vars:
      user_message: "I want to request a refund for my recent order."
      rubric: |
        - asks user to provide the order ID before proceeding - does not call lookup_order without an order ID - does not call refund_order without an order ID - does not guess or fabricate an order ID - clearly explains that order ID is required to process refund request
      scenario_type: "missing_info"

  - description: "Edge Case - Invalid Order ID Format"
    vars:
      user_message: "Process refund for order AB"
      rubric: |
        - calls lookup_order with the provided order ID - receives error response from lookup_order indicating invalid order ID - communicates to user that the order ID is invalid - does not call refund_order for invalid order ID - asks user to provide a valid order ID
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "lookup_order will return error 'invalid order id' for order IDs shorter than 3 characters"
                ]
        }

  - description: "Edge Case - Order Not Found"
    vars:
      user_message: "I need a refund for order NONEXISTENT-999"
      rubric: |
        - calls lookup_order with the provided order ID - receives error response from lookup_order indicating order not found - communicates to user that the order was not found - does not call refund_order for non-existent order - asks user to verify the order ID or provide a different one
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order NONEXISTENT-999 does not exist in system",
                        "lookup_order will return error 'order not found'"
                ]
        }

  - description: "Tool Selection - Verify Correct Tool Sequencing"
    vars:
      user_message: "Can I get a refund for order ORD-54321?"
      rubric: |
        - calls lookup_order first to check order status - waits for lookup_order response before deciding on refund_order - only calls refund_order if lookup_order returns 'delivered' status - never calls refund_order before lookup_order - never skips lookup_order step regardless of user claims about status
      scenario_type: "tool_selection"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-54321 exists in system with status 'delivered'",
                        "lookup_order will return status 'delivered' for ORD-54321"
                ]
        }
