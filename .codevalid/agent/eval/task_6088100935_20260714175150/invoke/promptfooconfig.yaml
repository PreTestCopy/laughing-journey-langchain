# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Agent eval — invoke (breakdown task_6088100935_20260714175150)"

prompts:
  - "{{ user_message }}"

providers:
  - file://providers.yaml

defaultTest:
  options:
    provider: file://../../shared/judge_provider.yaml
    rubricPrompt: file://../../shared/rubric_prompt.json
  assert:
    - type: llm-rubric
      value: "{{ rubric }}"

tests:
  - description: "Successful refund for delivered order"
    vars:
      user_message: "Customer requests a refund for order ORD-12345"
      rubric: |
        - calls lookup_order with order ID ORD-12345 - calls refund_order after confirming order status is delivered - responds with exactly 'Refund successful' - does not call refund_order before lookup_order
      scenario_type: "happy_path"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-12345 exists with status 'delivered'"
                ]
        }

  - description: "Refund denied for processing order"
    vars:
      user_message: "I want to cancel and refund order ORD-67890 please"
      rubric: |
        - calls lookup_order with the specified order ID - does NOT call refund_order - responds that refund is not allowed because order is still processing - mentions the order status in the response
      scenario_type: "happy_path"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-67890 exists with status 'processing'"
                ]
        }

  - description: "Agent calls lookup_order before refund_order"
    vars:
      user_message: "Please process refund for order ORD-11111"
      rubric: |
        - lookup_order is called first before any refund_order call - refund_order is only called after lookup_order returns delivered status - never skips the lookup_order step - never calls refund_order without first checking order status
      scenario_type: "tool_selection"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-11111 exists with status 'delivered'"
                ]
        }

  - description: "Agent asks for order ID when not provided"
    vars:
      user_message: "I need a refund for my order"
      rubric: |
        - asks the customer to provide their order ID - does not call lookup_order without an order ID - does not call refund_order without an order ID - does not guess or invent an order ID
      scenario_type: "missing_info"

  - description: "Invalid order ID format handling"
    vars:
      user_message: "Refund order AB please"
      rubric: |
        - calls lookup_order with the provided order ID - reports that the order ID is invalid - does not call refund_order - asks customer for a valid order ID
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'

  - description: "Non-existent order handling"
    vars:
      user_message: "I want a refund for order NONEXIST-99999"
      rubric: |
        - calls lookup_order with the specified order ID - reports that the order was not found - does not call refund_order for non-existent order - asks customer to verify the order ID
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order NONEXIST-99999 does not exist in the system"
                ]
        }

  - description: "Refund eligibility validation"
    vars:
      user_message: "My order ORD-22222 just shipped yesterday, I want a refund"
      rubric: |
        - calls lookup_order to verify order status - identifies that the order is in processing status - denies refund with appropriate explanation - does not call refund_order
      scenario_type: "validation"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-22222 exists with status 'processing'"
                ]
        }

  - description: "Handle multiple refund requests in single conversation"
    vars:
      user_message: "Customer request: Please help me process a refund for my order ORD-54321"
      rubric: |
        - identifies the order ID ORD-54321 from the request - calls lookup_order first to check order status - calls refund_order after confirming delivered status - provides customer-facing success message
      scenario_type: "happy_path"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-54321 exists with status 'delivered'"
                ]
        }
